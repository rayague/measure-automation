services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    expose:
      - "4317"
      - "4318"
      - "16686"
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  registry:
    image: descartesresearch/teastore-registry
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-registry"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      OTEL_INSTRUMENTATION_COMMON_EXPIRATOR_MEMORY_LIMIT: "1024"
      HOST_NAME: "registry"
      SERVICE_PORT: "8080"

  db:
    image: descartesresearch/teastore-db
    expose:
      - "3306"

  persistence:
    image: descartesresearch/teastore-persistence
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-persistence"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      HOST_NAME: "persistence"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
      DB_HOST: "db"
      DB_PORT: "3306"

  auth:
    image: descartesresearch/teastore-auth
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-auth"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      HOST_NAME: "auth"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"

  image:
    image: descartesresearch/teastore-image
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-image"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      HOST_NAME: "image"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"

  recommender:
    image: descartesresearch/teastore-recommender
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-recommender"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      HOST_NAME: "recommender"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"

  webui:
    image: descartesresearch/teastore-webui
    expose:
      - "8080"
    volumes:
      - ./otel-agent:/otel
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: "teastore-webui"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_PROPAGATORS: "tracecontext,baggage"
      HOST_NAME: "webui"
      REGISTRY_HOST: "registry"
      REGISTRY_PORT: "8080"
    ports:
      - "8080:8080"
